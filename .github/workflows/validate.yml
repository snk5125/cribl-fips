# Mirror of .gitlab-ci.yml for GitHub-hosted runs. Both CIs are thin: every
# step calls the same ci/*.sh scripts, so a green local
# `make lint build validate` is a green pipeline on either platform.
name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y -q shellcheck
      - run: ./ci/lint.sh

  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: build/vendor/
          key: vendor-cribl-4.18.2
      - name: build
        run: |
          version="sha-${GITHUB_SHA::7}"
          [ "$GITHUB_REF_TYPE" = "tag" ] && version="$GITHUB_REF_NAME"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          ARCH=amd64 IMAGE="$IMAGE" ./ci/build.sh "$version"
      - name: validate (boot + FIPS asserts)
        run: ./ci/validate.sh "$IMAGE:$VERSION"
      - name: save image for push job
        if: github.event_name != 'pull_request'
        run: docker save "$IMAGE:$VERSION" "$IMAGE:latest" | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: image
          path: image.tar.gz
          retention-days: 3

  push:
    runs-on: ubuntu-latest
    needs: [lint, build-validate]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load < image.tar.gz
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push
        run: |
          version="sha-${GITHUB_SHA::7}"
          [ "$GITHUB_REF_TYPE" = "tag" ] && version="$GITHUB_REF_NAME"
          PUSH_LATEST=1 ./ci/push.sh "$IMAGE" "$version"
