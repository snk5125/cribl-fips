# Mirror of .gitlab-ci.yml for GitHub-hosted runs. Both CIs are thin: every
# step calls the same ci/*.sh scripts, so a green local
# `make lint build validate` is a green pipeline on either platform.
name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y -q shellcheck
      - run: ./ci/lint.sh

  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: build/vendor/
          key: vendor-cribl-4.18.2
      - name: build
        run: |
          version="sha-${GITHUB_SHA::7}"
          [ "$GITHUB_REF_TYPE" = "tag" ] && version="$GITHUB_REF_NAME"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          ARCH=amd64 IMAGE="$IMAGE" ./ci/build.sh "$version"
      - name: validate (boot + FIPS asserts)
        run: ./ci/validate.sh "$IMAGE:$VERSION"
      # saved on PRs too: the scan job reuses it
      - name: save image for scan/push jobs
        run: docker save "$IMAGE:$VERSION" "$IMAGE:latest" | gzip > image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar.gz
          retention-days: 3

  scan:
    runs-on: ubuntu-latest
    needs: build-validate
    permissions:
      security-events: write   # SARIF upload to Code Scanning
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load < image.tar.gz
      - name: trivy scan (gate on fixable HIGH/CRITICAL)
        run: |
          version="sha-${GITHUB_SHA::7}"
          [ "$GITHUB_REF_TYPE" = "tag" ] && version="$GITHUB_REF_NAME"
          ./ci/scan.sh "$IMAGE:$version"
      # publish findings to the Security tab even when the gate fails
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: build/scan/trivy.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: |
            build/scan/trivy.sarif
            build/scan/trivy.json
          retention-days: 90

  push:
    runs-on: ubuntu-latest
    needs: [lint, build-validate, scan]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load < image.tar.gz
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push
        run: |
          version="sha-${GITHUB_SHA::7}"
          [ "$GITHUB_REF_TYPE" = "tag" ] && version="$GITHUB_REF_NAME"
          PUSH_LATEST=1 ./ci/push.sh "$IMAGE" "$version"
