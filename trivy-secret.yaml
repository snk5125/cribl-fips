# Secret-scan allowlist. Cribl's vendor defaults ship fake sample tokens as
# DLP masking-regex sampleData (default/cribl/regexes.yml) — not secrets.
# Scoped to the vendor default tree only, so a real secret baked into
# local/ or elsewhere still fails the scan.
allow-rules:
  - id: cribl-vendor-sample-data
    description: Cribl default config ships fake sample tokens for its masking regexes
    path: opt/cribl/default/.*
